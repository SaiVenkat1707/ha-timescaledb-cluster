  # ---------------------------------------------------------------------------
  # Internal NLB with two endpoints (write 5432 -> leader, read 5433 -> both)
  # ---------------------------------------------------------------------------
  Nlb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: tsdb-nlb
      Type: network
      Scheme: internal
      SecurityGroups: [!Ref NlbSg]
      Subnets: [!Ref SubnetIdA, !Ref SubnetIdB]

  WriteTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: tsdb-write-tg
      VpcId: !Ref VpcId
      Protocol: TCP
      Port: 5432
      TargetType: ip
      HealthCheckProtocol: HTTP
      HealthCheckPort: '8008'
      HealthCheckPath: /primary        # only the leader returns 200 here
      HealthCheckIntervalSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      Matcher: { HttpCode: '200' }
      Targets:
        - { Id: !GetAtt DbEni1.PrimaryPrivateIpAddress, Port: 5432 }
        - { Id: !GetAtt DbEni2.PrimaryPrivateIpAddress, Port: 5432 }

  ReadTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: tsdb-read-tg
      VpcId: !Ref VpcId
      Protocol: TCP
      Port: 5432
      TargetType: ip
      HealthCheckProtocol: HTTP
      HealthCheckPort: '8008'
      HealthCheckPath: /read-only      # primary AND replicas return 200 here
      HealthCheckIntervalSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      Matcher: { HttpCode: '200' }
      Targets:
        - { Id: !GetAtt DbEni1.PrimaryPrivateIpAddress, Port: 5432 }
        - { Id: !GetAtt DbEni2.PrimaryPrivateIpAddress, Port: 5432 }

  WriteListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Nlb
      Protocol: TCP
      Port: 5432
      DefaultActions: [{ Type: forward, TargetGroupArn: !Ref WriteTargetGroup }]

  ReadListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Nlb
      Protocol: TCP
      Port: 5433
      DefaultActions: [{ Type: forward, TargetGroupArn: !Ref ReadTargetGroup }]

# =============================================================================
Outputs:
# =============================================================================
  WriteEndpoint:
    Description: Connect here for WRITES (port 5432) - always the current leader
    Value: !Sub '${Nlb.DNSName}:5432'
  ReadEndpoint:
    Description: Connect here for READS (port 5433) - spread across primary + replica
    Value: !Sub '${Nlb.DNSName}:5433'
  BackupBucketName:
    Description: pgBackRest S3 bucket (full + incremental + WAL)
    Value: !Ref BackupBucket
  ArchiveBucketName:
    Description: Parquet cold-archive S3 bucket (chunks older than 90 days)
    Value: !Ref ArchiveBucket
  AccessNote:
    Description: How to get a shell (no SSH)
    Value: 'Use AWS SSM: aws ssm start-session --target <instance-id>'
