        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          exec > /var/log/db-bootstrap.log 2>&1
          export DEBIAN_FRONTEND=noninteractive

          BACKUP_BUCKET="${BackupBucket}"
          ARCHIVE_BUCKET="${ArchiveBucket}"
          REGION="${AWS::Region}"

          snap install amazon-ssm-agent --classic 2>/dev/null || true
          systemctl enable --now snap.amazon-ssm-agent.amazon-ssm-agent.service 2>/dev/null || systemctl start amazon-ssm-agent 2>/dev/null || true

          TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 300")
          NODE_IP=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/local-ipv4)
          NODE_NAME=pg-node-2

          apt-get update
          apt-get install -y curl gnupg lsb-release ca-certificates python3-pip jq openssl
          install -d /usr/share/postgresql-common/pgdg
          curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list
          curl -s https://packagecloud.io/install/repositories/timescale/timescaledb/script.deb.sh | bash
          apt-get update
          apt-get install -y postgresql-16 timescaledb-2-postgresql-16 pgbackrest
          # Install Python deps. Old pip (e.g. Ubuntu 22.04 system pip) has no
          # --break-system-packages flag and doesn't need it; newer pip is
          # externally-managed and does. Try plain first, fall back to the flag.
          pip3 install 'patroni[etcd3]' psycopg2-binary pyarrow boto3 || pip3 install --break-system-packages 'patroni[etcd3]' psycopg2-binary pyarrow boto3
          systemctl stop postgresql || true
          systemctl disable postgresql || true

          mkdir -p /etc/patroni/certs
          openssl req -new -x509 -days 3650 -nodes -text -out /etc/patroni/certs/server.crt -keyout /etc/patroni/certs/server.key -subj "/CN=$NODE_IP"
          chmod 600 /etc/patroni/certs/server.key

