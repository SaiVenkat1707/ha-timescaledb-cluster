          sudo -u postgres pgbackrest --stanza=tsdb --type=$T backup
          BK
          chmod +x /opt/backup.sh

          # archival wrapper (passes bucket/region to the python job)
          cat > /opt/archive.sh <<ARCH
          #!/bin/bash
          # Run the archival job AS the postgres OS user so local peer auth
          # succeeds (cron invokes this as root; connecting as postgres over the
          # unix socket requires the OS user to be postgres). Bucket/region are
          # passed through into the postgres shell so boto3 can read them.
          exec sudo -u postgres bash -c 'ARCHIVE_BUCKET="${ArchiveBucket}" REGION="${AWS::Region}" python3 /opt/archive_chunks.py'
          ARCH
          chmod +x /opt/archive.sh

          # Parquet archival: export chunks older than 90 days to S3, then drop them.
          # Cold archive only - NOT queried back through TimescaleDB. Leader only.
          cat > /opt/archive_chunks.py <<'PY'
          #!/usr/bin/env python3
          import os, sys, io
          import psycopg2, pyarrow as pa, pyarrow.parquet as pq, boto3
          bucket = os.environ["ARCHIVE_BUCKET"]
          region = os.environ["REGION"]
          conn = psycopg2.connect("dbname=postgres user=postgres host=/var/run/postgresql")
          conn.autocommit = True
          cur = conn.cursor()
          cur.execute("SELECT pg_is_in_recovery()")
          if cur.fetchone()[0]:
              sys.exit(0)  # replica: do nothing
          cur.execute("""SELECT chunk_schema, chunk_name FROM timescaledb_information.chunks
                         WHERE hypertable_name='vehicle_snapshots'
                           AND range_end < now() - INTERVAL '90 days'""")
          chunks = cur.fetchall()
          if not chunks:
              sys.exit(0)
          s3 = boto3.client("s3", region_name=region)
          ok = True
          for schema, name in chunks:
              try:
                  rc = conn.cursor()
                  rc.execute('SELECT * FROM "%s"."%s"' % (schema, name))
                  cols = [d[0] for d in rc.description]
                  data = {c: [] for c in cols}
                  for row in rc.fetchall():
                      for c, v in zip(cols, row):
                          data[c].append(None if v is None else str(v))
                  buf = io.BytesIO()
                  pq.write_table(pa.table(data), buf)
                  s3.put_object(Bucket=bucket, Key="vehicle_snapshots/%s.parquet" % name, Body=buf.getvalue())
                  rc.close()
              except Exception as e:
                  sys.stderr.write("failed %s: %s\n" % (name, e))
                  ok = False
          if ok:
              cur.execute("SELECT drop_chunks('vehicle_snapshots', older_than => INTERVAL '90 days')")
          PY
          chmod +x /opt/archive_chunks.py

          cat > /etc/cron.d/tsdb-jobs <<'CRON'
          0 2 * * * root /opt/backup.sh  >> /var/log/tsdb-backup.log 2>&1
          0 3 * * * root /opt/archive.sh >> /var/log/tsdb-archive.log 2>&1
          CRON

          # Initial backup is handled by a POST-BOOT systemd oneshot (below),
          # NOT inline here. Doing it inline raced Patroni's leader election and
          # kept failing. The oneshot polls until this node is genuinely the
          # settled leader, then runs stanza-create + first full backup once.
          cat > /opt/initial_backup.sh <<'IB'
          #!/bin/bash
          # Wait (long, no premature give-up) until this node is the settled leader.
          # If it becomes a stable replica instead, exit cleanly - the leader's
          # copy of this oneshot performs the backup.
          for i in $(seq 1 60); do
            if /opt/is_leader.sh; then
              sudo -u postgres pgbackrest --stanza=tsdb stanza-create || true
              sudo -u postgres pgbackrest --stanza=tsdb --type=full backup || true
              exit 0
            fi
            sleep 15
          done
          exit 0
          IB
          chmod +x /opt/initial_backup.sh

          cat > /etc/systemd/system/tsdb-initial-backup.service <<'IBU'
          [Unit]
          Description=TSDB initial pgBackRest backup (post-boot, leader only)
          After=patroni.service network-online.target
          Wants=network-online.target
          [Service]
          Type=oneshot
          ExecStart=/opt/initial_backup.sh
          [Install]
          WantedBy=multi-user.target
          IBU
          systemctl daemon-reload
          systemctl enable tsdb-initial-backup.service || true
          # start without blocking user-data (the oneshot may poll for minutes)
          systemctl start --no-block tsdb-initial-backup.service || true
          echo "DB BOOTSTRAP COMPLETE"

  DbNode2:
    Type: AWS::EC2::Instance
    DependsOn: [EtcdNode1, EtcdNode2, EtcdNode3, DbNode1]
    Properties:
      InstanceType: !Ref DbInstanceType
      ImageId: !Ref UbuntuArmAmi
      NetworkInterfaces:
        - { NetworkInterfaceId: !Ref DbEni2, DeviceIndex: 0 }
      IamInstanceProfile: !Ref DbInstanceProfile
      MetadataOptions: { HttpTokens: required }
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs: { VolumeSize: !Ref DbVolumeSizeGb, VolumeType: gp3, Encrypted: true, DeleteOnTermination: true }
